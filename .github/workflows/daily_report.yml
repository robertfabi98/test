name: ClickUp Daily Report

on:
  schedule:
    # 07:00 UTC = 08:00 CET (inverno, UTC+1)
    # In estate (CEST, UTC+2) cambia in "0 6 * * *" per restare alle 08:00
    - cron: '0 7 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  clickup-report:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Invia report ClickUp su Telegram
        env:
          CLICKUP_TOKEN: ${{ secrets.CLICKUP_TOKEN }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          CLICKUP_SPACE_ID: ${{ secrets.CLICKUP_SPACE_ID }}
        run: python scripts/clickup_report.py
